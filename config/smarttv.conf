# Configuración de Smart TV Automation
# Este archivo se sourcea desde todos los scripts

# ============= ADB =============
ADB_TARGET="192.168.101.50:5555"
ADB_CHECK_INTERVAL=5
ADB_COMMAND="/usr/bin/adb"

# ============= IR (Infrared) =============
IR_DEVICE="/dev/input/event0"
IR_KEYTABLE="/usr/bin/ir-keytable"
IR_PROTOCOL="nec,necx"
IR_RETRIES=5
IR_RETRY_DELAY=5

# ============= LOGGING =============
LOG_DIR="/var/log/smarttv-automation"
LOG_LEVEL="INFO"  # DEBUG, INFO, WARNING, ERROR
MAGIS_LOG="/var/log/magis.log"
MAX_LOG_SIZE=10485760  # 10MB
LOG_RETENTION_DAYS=7

# ============= PATHS =============
SCRIPTS_DIR="/usr/local/bin/smarttv"
CONFIG_DIR="/etc/smarttv-automation"
MAGIS_SCRIPT="${SCRIPTS_DIR}/magis.sh"
COMMON_FUNCTIONS="${SCRIPTS_DIR}/common-functions.sh"

# ============= UI DUMP (para detección de pop-ups) =============
UI_DUMP_PATH="/sdcard/ui.xml"
UI_LOCAL_PATH="/tmp/ui.xml"
MAGIS_APP="com.android.mgstv"

# ============= TIMEOUTS (en segundos) =============
ADB_CONNECT_TIMEOUT=10
IR_LISTENER_TIMEOUT=30
EVTEST_TIMEOUT=3600  # 1 hora, evita cuelgues